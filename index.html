<!DOCTYPE html>
<html lang="es-CR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    frame-ancestors se omite a propósito: solo tiene efecto como encabezado
    HTTP real (Content-Security-Policy vía respuesta del servidor), no como
    meta tag — el navegador la ignora en este contexto y emite un warning en
    consola si se declara aquí. Este sitio se sirve como build estático
    (sin servidor propio que agregue encabezados), así que no hay forma de
    enviarla como header desde este hosting.
  -->
  <!--
    ws://localhost:* y ws://127.0.0.1:* en connect-src: requeridos por el
    WebSocket de HMR de Vite en desarrollo. Se dejan siempre presentes (no
    condicionados a import.meta.env.DEV) porque esta meta tag se escribe una
    sola vez al parsear el HTML, antes de que cualquier script del bundle
    (y por tanto import.meta.env) exista; condicionarlo requeriría un plugin
    de Vite que reescriba el HTML en build. No representa riesgo real: en
    producción no hay servidor de dev escuchando en esos orígenes, así que
    la directiva queda inerte.
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https://flagcdn.com;
      connect-src 'self' https://worldcup26.ir ws://localhost:* ws://127.0.0.1:*;
      object-src 'none';
      base-uri 'self';
    "
  />
  <title>WC26 Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
  />
  <link rel="stylesheet" href="./src/styles/input.css" />
</head>

<body class="bg-void text-white font-body">
  <div class="ambient-glow"></div>
  <div class="bg-map-silhouette" aria-hidden="true"></div>

  <div id="app"></div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
